<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inpixel Network — Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="logo1.jpeg">
  <link rel="stylesheet" href="/adminpanel/adminpanel.css">
</head>
<body>
  <div class="grid-bg"></div>

  <!-- ADMIN GATE -->
  <div id="adminGate">
    <div class="gate-card">
      <div class="gate-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <h2>Admin Access</h2>
      <p>Enter the admin passcode to access the client submissions panel.</p>
      <input class="gate-input" type="password" id="gateInput" placeholder="••••••••" maxlength="20">
      <button class="gate-btn" onclick="checkGate()">Enter Panel</button>
      <p class="gate-error" id="gateError">Incorrect passcode. Try again.</p>
    </div>
  </div>

  <nav>
    <div style="display:flex;align-items:center;gap:14px;">
      <a class="nav-logo" href="index.html">
        <img src="logo.jpeg" alt="Inpixel Network">
        <span>Inpixel Network</span>
      </a>
      <span class="nav-badge">Admin Panel</span>
    </div>
    <div class="nav-right">
      <a class="nav-back" href="index.html">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Back to Site
      </a>
    </div>
  </nav>

  <main>
    <div class="page-header">
      <div class="page-header-left">
        <p>Dashboard</p>
        <h1>Client Submissions</h1>
      </div>
      <div class="stats-row" id="statsRow">
        <div class="stat-chip">
          <div class="stat-chip-num" id="statTotal">0</div>
          <div class="stat-chip-label">Total</div>
        </div>
        <div class="stat-chip">
          <div class="stat-chip-num" id="statToday">0</div>
          <div class="stat-chip-label">Today</div>
        </div>
        <div class="stat-chip">
          <div class="stat-chip-num" id="statWeek">0</div>
          <div class="stat-chip-label">This Week</div>
        </div>
      </div>
    </div>

    <div class="toolbar">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Search by name, email, business..." oninput="filterCards()">
      </div>
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('today', this)">Today</button>
      <button class="filter-btn" onclick="setFilter('week', this)">This Week</button>
      <button class="clear-btn" onclick="confirmClearAll()">Clear All</button>
    </div>

    <div id="cardsContainer"></div>
  </main>

  <!-- OVERLAY -->
  <div class="overlay" id="overlay" onclick="closeModal()"></div>

  <!-- DETAIL MODAL -->
  <div class="detail-modal" id="detailModal">
    <div class="modal-header">
      <div class="modal-header-left">
        <div class="modal-avatar" id="mAvatar"></div>
        <div>
          <div class="modal-name" id="mName"></div>
          <div class="modal-sub" id="mSub"></div>
        </div>
      </div>
      <button class="modal-close" onclick="closeModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="modal-body" id="mBody"></div>

    <div class="modal-footer">
      <div class="modal-timestamp" id="mTimestamp"></div>
      <button class="delete-btn" id="mDeleteBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        Delete Entry
      </button>
    </div>
  </div>

  <script src="/adminpanel/adminpanel.js"></script>
</body>
</html>
